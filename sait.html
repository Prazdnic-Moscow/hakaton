<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR сцена с кнопкой</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #2c3e50;
            font-family: Arial, sans-serif;
        }
        
        #buttonContainer {
            text-align: center;
        }
        
        #openARButton {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }
        
        #openARButton:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        
        #arScene {
            display: none;
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        
        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div id="buttonContainer">
        <button id="openARButton">Открыть AR сцену</button>
    </div>

    <div id="arScene">
        <button class="close-button" onclick="closeAR()">X</button>
        <a-scene mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.000001; filterBeta: 1; warmupTolerance: 10; missTolerance: 10" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
            <a-assets>
                <a-asset-item id="revolver" src="models/revolver/scene.gltf"></a-asset-item>
            </a-assets>
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
            <a-entity mindar-image-target="targetIndex: 0">
                <a-gltf-model rotation="0 180 0 " position="-0.2 -0.15 0.1" scale="1.005 1.005 1.005" src="#revolver">
            </a-entity>
        </a-scene>
    </div>

    <script>
        document.getElementById('openARButton').addEventListener('click', function() {
            document.getElementById('buttonContainer').style.display = 'none';
            document.getElementById('arScene').style.display = 'block';
        });
        
        function closeAR() {
            document.getElementById('buttonContainer').style.display = 'block';
            document.getElementById('arScene').style.display = 'none';
        }
    </script>
</body>
</html>
